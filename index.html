<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikolas Scripts</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{--cyan:#00f0ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;height:100vh;color:white;background:linear-gradient(140deg,#020617,#032b4a,#020617);background-size:400% 400%;animation:bgmove 40s ease infinite;overflow:hidden;}
@keyframes bgmove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.login{display:flex;align-items:center;justify-content:center;height:100vh;}
.loginBox{width:360px;padding:45px;border-radius:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(0,240,255,0.4);box-shadow:0 0 20px rgba(0,240,255,0.3);}
.loginBox h2{font-family:'Orbitron',sans-serif;text-align:center;margin-bottom:30px;color:var(--cyan);}
input,textarea,select{width:100%;padding:12px;margin-bottom:12px;background:#020617;border:1px solid rgba(0,240,255,0.3);border-radius:8px;color:white;}
button{padding:12px;border-radius:8px;border:none;background:linear-gradient(90deg,#00f0ff,#00c8ff);font-weight:600;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(0,240,255,0.7);}
.app{display:none;}
.sidebar{position:fixed;left:0;top:0;height:100vh;width:260px;background:rgba(10,20,35,0.9);border-right:1px solid rgba(0,240,255,0.25);padding:30px;}
.logo{font-family:'Orbitron',sans-serif;font-size:22px;color:var(--cyan);margin-bottom:40px;}
.sidebar a{display:block;padding:12px;margin-bottom:10px;border-radius:8px;cursor:pointer;color:#cbd5e1;}
.sidebar a:hover{background:rgba(0,240,255,0.15);color:var(--cyan);}
.logout{position:absolute;bottom:30px;width:200px;}
.topbar{position:fixed;left:260px;top:0;height:70px;width:calc(100% - 260px);background:rgba(10,20,35,0.8);border-bottom:1px solid rgba(0,240,255,0.25);display:flex;align-items:center;padding-left:30px;font-weight:600;color:var(--cyan);}
.content{margin-left:260px;margin-top:70px;padding:35px;height:calc(100vh - 70px);overflow:auto;}
.title{font-size:34px;font-weight:700;margin-bottom:25px;color:var(--cyan);font-family:'Orbitron',sans-serif;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(0,240,255,0.25);padding:25px;border-radius:15px;margin-bottom:20px;}
.hidden{display:none;}
.floatBtn{position:fixed;bottom:20px;right:20px;width:40px;height:40px;background:var(--cyan);border-radius:50%;color:#020617;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-buttons{display:flex;gap:20px;margin-top:15px;}
.card-buttons button{flex:1;padding:12px;font-size:16px;}
</style>
</head>

<body>

<div class="login" id="loginPage">
<div class="loginBox">
<h2>Nikolas Scripts</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button style="width:100%" onclick="login()">Entrar</button>
</div>
</div>

<div class="app" id="app">

<div class="sidebar">
<div class="logo">Nikolas Scripts</div>
<a onclick="show('inicio')">Inicio</a>
<a onclick="show('ajuda')">Ajuda</a>
<a onclick="show('scripts')">Scripts</a>
<a onclick="show('tarefas')">Tarefas</a>
<a onclick="show('avaliacao')">Avaliação</a>
<a id="adminMenu" onclick="show('admin')">Admin</a>
<button class="logout" onclick="logout()">Sair</button>
</div>

<div class="topbar" id="topText">Bem-vindo</div>

<div class="content">

<div id="inicio">
<div class="title">Inicio</div>
<div id="news"></div>
<button class="floatBtn hidden" id="addNewsBtn" onclick="showModal('news')">N</button>
</div>

<div id="ajuda" class="hidden">
<div class="title">Ajuda</div>
<div class="card">Como copiar scripts: clique em copiar.</div>
<div class="card">Como enviar tarefas: use a aba tarefas.</div>
</div>

<div id="scripts" class="hidden">
<div class="title">Scripts</div>
<div id="scriptsList"></div>
<button class="floatBtn hidden" id="addScriptBtn" onclick="showModal('script')">S</button>
</div>

<div id="tarefas" class="hidden">
<div class="title">Tarefas</div>

<div class="card">
<input id="tUser" placeholder="Usuário">
<input id="tPass" placeholder="Senha">
<input id="tContato" placeholder="Contato">
<button style="width:100%" onclick="enviarTarefa()">Enviar</button>
</div>

<div id="tasksList"></div>
</div>

<div id="avaliacao" class="hidden">
<div class="title">Avaliação</div>

<div class="card" id="starsCard">
<span onclick="setRating(1)">☆</span>
<span onclick="setRating(2)">☆</span>
<span onclick="setRating(3)">☆</span>
<span onclick="setRating(4)">☆</span>
<span onclick="setRating(5)">☆</span>

<textarea id="feedbackText" placeholder="Escreva seu feedback"></textarea>
<button onclick="addFeedback()">Publicar</button>
</div>

<div id="feedbackList"></div>
</div>

<div id="admin" class="hidden">
<div class="title">Admin</div>

<div class="card">
<h3>Adicionar Usuários</h3>
<input id="newUser" placeholder="Nome do usuário">
<input id="newPass" placeholder="Senha">

<select id="newRole">
<option value="admin">Administrador</option>
<option value="amigo">Amigo</option>
<option value="desconhecido">Desconhecido</option>
</select>

<button onclick="adicionarUsuario()">Adicionar</button>
</div>

<div id="userList"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBlUuCqR78eduNnDzquWBpBgI5BP9l0ymU",
authDomain: "nikolas-scripts-2-0.firebaseapp.com",
projectId: "nikolas-scripts-2-0",
storageBucket: "nikolas-scripts-2-0.appspot.com",
messagingSenderId: "366421783041",
appId: "1:366421783041:web:e051573254b6d02400c600"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser=null;
let rating=0;

async function login(){

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

const q=query(collection(db,"users"),where("username","==",u),where("password","==",p));
const snap=await getDocs(q);

if(!snap.empty){

const data=snap.docs[0].data();
currentUser={username:data.username,role:data.role};

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("topText").innerText=`Bem-vindo, ${currentUser.username}`;

updateUIByRole();

carregarNoticias();
carregarScripts();
carregarUsuarios();
carregarTarefas();
carregarFeedbacks();

}else alert("Usuário ou senha incorretos");

}

function logout(){
currentUser=null;
document.getElementById("loginPage").style.display="flex";
document.getElementById("app").style.display="none";
}

function show(tab){
document.querySelectorAll(".content > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(tab).classList.remove("hidden");
}

function updateUIByRole(){

document.getElementById("addNewsBtn").classList.toggle("hidden",currentUser.role!=="admin");
document.getElementById("addScriptBtn").classList.toggle("hidden",currentUser.role!=="admin");

if(currentUser.role!=="admin"){
document.getElementById("adminMenu").style.display="none";
}

}

window.login=login;
window.logout=logout;
window.show=show;

window.enviarTarefa=async function(){

const tUser=document.getElementById("tUser").value;
const tPass=document.getElementById("tPass").value;
const tContato=document.getElementById("tContato").value;

if(tUser&&tPass&&tContato){

await addDoc(collection(db,"tasks"),{
user:tUser,
pass:tPass,
contact:tContato,
date:new Date()
});

alert("Tarefa enviada");

}

};

async function carregarTarefas(){

const tasksDiv=document.getElementById("tasksList");
tasksDiv.innerHTML="";

if(currentUser.role!=="admin") return;

const snap=await getDocs(collection(db,"tasks"));

snap.forEach(docu=>{

const d=docu.data();

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<b>${d.user}</b> - ${d.contact}
<br>
${d.date.toDate().toLocaleString()}
`;

tasksDiv.appendChild(card);

});

}

</script>

</body>
</html>
