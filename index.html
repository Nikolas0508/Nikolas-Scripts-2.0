<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nikolas Scripts</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;
}

/* FUNDO ANIMADO */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(270deg,#021a02,#062d06,#000000,#052505);
background-size:800% 800%;
animation:fundo 20s ease infinite;
z-index:-1;
}

@keyframes fundo{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* LOGIN */

#loginScreen{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.loginBox{

background:rgba(0,0,0,0.75);
padding:40px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,255,100,0.25);
text-align:center;
width:300px;

}

input{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
outline:none;

}

button{

width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:5px;
background:#0f7a0f;
color:white;
cursor:pointer;

}

button:hover{

background:#12a312;

}

/* PAINEL */

#dashboard{

display:none;
height:100vh;

}

/* SIDEBAR */

.sidebar{

width:200px;
height:100%;
background:#050505;
position:fixed;
left:0;
top:0;
display:flex;
flex-direction:column;
justify-content:space-between;

}

.sidebar h2{

text-align:center;
padding:20px 0;

}

.logout{

padding:15px;
background:#0f7a0f;
text-align:center;
cursor:pointer;

}

/* TOPO */

.topbar{

margin-left:200px;
padding:20px;
font-size:20px;

}

/* CARDS */

.cards{

margin-left:200px;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;

}

.card{

background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,255,100,0.15);

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="loginBox">

<h2>Login</h2>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<!-- PAINEL -->

<div id="dashboard">

<div class="sidebar">

<h2>Painel</h2>

<div class="logout" onclick="logout()">Logout</div>

</div>

<div class="topbar">

Bem-vindo, <span id="username"></span>

</div>

<div class="cards">

<div class="card">
<h3>Scripts</h3>
<p>Gerenciar scripts</p>
</div>

<div class="card">
<h3>Usuários</h3>
<p>Painel de usuários</p>
</div>

<div class="card">
<h3>Config</h3>
<p>Configurações</p>
</div>

</div>

</div>

<script>

const USER="NikolasP"
const PASS="2011"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===USER && p===PASS){

document.getElementById("loginScreen").style.display="none"
document.getElementById("dashboard").style.display="block"
document.getElementById("username").innerText=u

}else{

alert("Login inválido")

}

}

function logout(){

location.reload()

}

</script>

</body>
</html>
