<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikolas Scripts | Login</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --neon:#00ff88;
    --bg-login: #000000;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

/* FUNDO LOGIN */
body{
    background: linear-gradient(
        160deg,
        #000000 0%,
        #03130c 35%,
        #052017 60%,
        #000000 100%
    );
    position:relative;
    height:100vh;
}

/* GLOW CENTRAL */
body::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, rgba(0,255,136,0.15), transparent 65%);
    pointer-events:none;
}

/* LOGIN CENTRAL */
.login{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
    z-index:1;
}

.login-box{
    width:380px;
    padding:45px;
    border-radius:20px;
    background: rgba(10, 20, 15, 0.65);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,255,136,0.2);
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    animation: fadeLogin 0.8s ease;
    text-align:center;
}

@keyframes fadeLogin{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.login-box h2{
    color: var(--neon);
    margin-bottom:30px;
    font-weight:800;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(0,255,136,0.6);
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    background: rgba(0,0,0,0.4);
    border:1px solid rgba(0,255,136,0.3);
    border-radius:8px;
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color: var(--neon);
    box-shadow:0 0 12px rgba(0,255,136,0.6);
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-weight:700;
    background: linear-gradient(90deg,#00ff88,#00cc6a);
    color:#001a0f;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px var(--neon);
}

/* LOADER */
#loader{
    border: 4px solid rgba(0,255,136,0.2);
    border-top: 4px solid #00ff88;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    margin: 20px auto;
    animation: spin 0.7s linear infinite;
}
@keyframes spin{
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.hidden{display:none;}
</style>
</head>
<body>

<div class="login">
    <div class="login-box">
        <h2>Nikolas Scripts</h2>
        <input id="username" placeholder="Usuário">
        <input id="password" type="password" placeholder="Senha">
        <div id="loader" class="hidden"></div>
        <button onclick="login()">Entrar</button>
        <p id="msg" style="color:#ff4d4d;margin-top:10px;"></p>
    </div>
</div>

<script type="module">
// Simulação de login com loader
const username = document.getElementById("username");
const password = document.getElementById("password");
const loader = document.getElementById("loader");
const msg = document.getElementById("msg");

window.login = async function(){
    loader.classList.remove("hidden");
    msg.innerText = "";
    await new Promise(r => setTimeout(r, 800)); // delay rápido
    
    if(username.value === "admin" && password.value === "1234"){
        loader.classList.add("hidden");
        alert("Login bem-sucedido! Aqui vamos pro painel interno.");
        // Aqui você chama start() para abrir painel real depois
    } else {
        loader.classList.add("hidden");
        msg.innerText = "Usuário ou senha inválidos";
    }
};
</script>

</body>
</html>
