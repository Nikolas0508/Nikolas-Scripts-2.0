<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikolas Scripts</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--cyan:#00eaff;
--cyan2:#008cff;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

/* FUNDO RGB */

body{
background: linear-gradient(270deg,#020611,#071a3a,#020611,#001933,#020611);
background-size:800% 800%;
animation:bgMove 30s ease infinite;
}

@keyframes bgMove{

0%{background-position:0% 50%;}
25%{background-position:50% 0%;}
50%{background-position:100% 50%;}
75%{background-position:50% 100%;}
100%{background-position:0% 50%;}

}

/* LOGIN */

.login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:340px;
padding:40px;

background:rgba(10,10,15,0.75);

border-radius:14px;

backdrop-filter:blur(10px);

border:1px solid rgba(0,200,255,0.25);

box-shadow:
0 0 20px rgba(0,200,255,0.25),
0 0 40px rgba(0,200,255,0.15);

animation:aparecer 1s ease;

text-align:center;

}

@keyframes aparecer{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.login-box h2{
color:var(--cyan);
margin-bottom:5px;
}

.sub{
color:#aaa;
font-size:13px;
margin-bottom:20px;
}

input{

width:100%;
padding:12px;

margin:12px 0;

background:rgba(0,0,0,0.6);

border-radius:8px;

border:1px solid rgba(0,200,255,0.25);

color:white;

outline:none;

transition:0.3s;

}

input:focus{

border:1px solid var(--cyan);

box-shadow:0 0 8px var(--cyan);

}

button{

width:100%;
padding:12px;

margin-top:10px;

background:linear-gradient(45deg,var(--cyan),var(--cyan2));

border:none;

border-radius:8px;

color:white;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 10px var(--cyan),
0 0 20px var(--cyan2);

}

/* APP */

.app{
display:none;
height:100%;
}

/* SIDEBAR */

.sidebar{

position:fixed;
top:0;

width:260px;
height:100vh;

background:rgba(5,10,20,0.92);

backdrop-filter:blur(12px);

padding:18px 20px;

border-right:1px solid rgba(0,200,255,0.2);

box-shadow:
8px 0 40px rgba(0,0,0,0.7),
inset -1px 0 0 rgba(0,200,255,0.15);

}

.logo{

font-size:22px;
font-weight:800;

color:var(--cyan);

margin-bottom:35px;

letter-spacing:1px;

text-shadow:
0 0 10px rgba(0,200,255,0.6),
0 0 20px rgba(0,200,255,0.4);

}

.menu a{

display:block;
padding:12px 15px;
margin:6px 0;

border-radius:8px;

cursor:pointer;

position:relative;

color:#cfcfcf;

transition:.25s;

}

.menu a:hover{

background:rgba(0,200,255,0.08);

color:var(--cyan);

transform:translateX(6px);

box-shadow:inset 0 0 10px rgba(0,200,255,0.15);

}

.menu a.active{
color:var(--cyan);
}

.menu a.active::before{

content:"";

position:absolute;

left:-2px;
top:6px;

width:4px;
height:28px;

border-radius:3px;

background:linear-gradient(
180deg,
#00eaff,
#008cff,
#00eaff
);

box-shadow:
0 0 8px #00eaff,
0 0 16px #00eaff;

}

/* TOPBAR */

.topbar{

position:fixed;

left:260px;
top:0;

width:calc(100% - 260px);
height:70px;

background:rgba(5,10,20,0.92);

display:flex;
align-items:center;

padding:0 30px;

border-bottom:1px solid rgba(0,200,255,0.15);

}

.user{
font-weight:600;
color:var(--cyan);
}

/* CONTEUDO */

.content{

margin-left:260px;
margin-top:90px;

padding:40px;

animation:fade .6s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.card{

background:rgba(13,31,23,0.6);

backdrop-filter:blur(15px);

padding:25px;

border-radius:14px;

margin-bottom:20px;

transition:.3s;

}

.card:hover{

transform:translateY(-4px);

box-shadow:0 0 12px var(--cyan);

}

.title{
font-size:28px;
margin-bottom:10px;
}

/* LOGOUT */

.logout{

position:absolute;

bottom:30px;

width:80%;

}

</style>
</head>

<body>

<div class="login" id="loginPage">

<div class="login-box">

<h2>Nikolas Scripts</h2>
<p class="sub">Painel administrativo</p>

<input id="username" placeholder="Usuário">
<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="msg"></p>

</div>

</div>

<div class="app" id="app">

<div class="sidebar">

<div class="logo">Nikolas Scripts</div>

<div class="menu">

<a onclick="show('inicio')" class="active">🏠 Início</a>

<a onclick="show('scripts')">📜 Scripts</a>

<a onclick="show('tutorial')">📘 Tutorial</a>

<a onclick="show('admin')">🛠 Admin</a>

</div>

<button class="logout" onclick="logout()">Sair</button>

</div>

<div class="topbar">

<div class="user" id="userDisplay"></div>

</div>

<div class="content">

<div id="inicio">

<div class="title">Início</div>

<div class="card">

<p><b>NOVIDADES</b></p>

<p>Scripts em desenvolvimento.</p>

</div>

<div class="card">

Outro card exemplo.

</div>

</div>

<div id="scripts" style="display:none">

<div class="title">Scripts</div>

<div class="card">Nenhum script ainda.</div>

</div>

<div id="tutorial" style="display:none">

<div class="title">Tutorial</div>

<div class="card">

Como usar bookmarklet etc.

</div>

</div>

<div id="admin" style="display:none">

<div class="title">Admin</div>

<div class="card">Painel admin futuramente.</div>

</div>

</div>

</div>

<script>

const loginPage=document.getElementById("loginPage");
const app=document.getElementById("app");

function login(){

let u=username.value;
let p=password.value;

if(u==="NikolasP" && p==="2011"){

loginPage.style.display="none";

app.style.display="block";

userDisplay.innerText="Bem-vindo, "+u;

}else{

msg.innerText="Usuário ou senha inválidos";

}

}

function logout(){
location.reload();
}

function show(id){

["inicio","scripts","tutorial","admin"].forEach(sec=>{

document.getElementById(sec).style.display="none";

});

document.getElementById(id).style.display="block";

document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));

event.target.classList.add("active");

}

</script>

</body>
</html>
