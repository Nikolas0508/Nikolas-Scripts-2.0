```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#ff0000,#00ffea,#0000ff);
background-size:400% 400%;
animation:rgb 10s infinite alternate;
}

@keyframes rgb{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

#loginPage{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
}

#loginBox{
background:white;
padding:30px;
border-radius:10px;
width:250px;
text-align:center;
}

input,select,button,textarea{
width:100%;
margin-top:10px;
padding:8px;
box-sizing:border-box;
}

button{
cursor:pointer;
}

#app{
display:none;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.hidden{
display:none;
}

.scriptBox{
background:#111;
color:#0f0;
padding:10px;
margin-top:10px;
white-space:pre-wrap;
}

.copyBtn{
background:#333;
color:white;
}

.deleteBtn{
background:red;
color:white;
margin-top:5px;
}

</style>
</head>

<body>

<div id="loginPage">
<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha" type="password">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app">

<h2 id="topText"></h2>

<button id="adminBtn" class="hidden">Painel Admin</button>

<div class="card">
<h3>Novidades</h3>

<textarea id="newsText"></textarea>
<button id="addNewsBtn" onclick="addNews()">Adicionar</button>

<div id="newsList"></div>

</div>

<div class="card">
<h3>Scripts</h3>

<textarea id="scriptText"></textarea>
<button id="addScriptBtn" onclick="addScript()">Adicionar</button>

<div id="scriptList"></div>

</div>

</div>

<script>

let currentUser=null;

const users=[
{username:"admin",password:"admin123",role:"admin"},
{username:"user",password:"123",role:"user"}
];

let news=[];
let scripts=[];

function login(){

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

const user=users.find(x=>x.username===u && x.password===p);

if(!user){
alert("Login inválido");
return;
}

currentUser=user;

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("topText").innerText="Bem vindo "+currentUser.username;

document.getElementById("adminBtn").classList.toggle("hidden",currentUser.role!=="admin");
document.getElementById("addNewsBtn").classList.toggle("hidden",currentUser.role!=="admin");
document.getElementById("addScriptBtn").classList.toggle("hidden",currentUser.role!=="admin");

renderNews();
renderScripts();

}

function addNews(){

const txt=document.getElementById("newsText").value;

if(!txt) return;

news.push({
id:Date.now(),
text:txt
});

document.getElementById("newsText").value="";

renderNews();

}

function renderNews(){

const list=document.getElementById("newsList");
list.innerHTML="";

news.forEach(n=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>${n.text}</div>
`;

if(currentUser.role==="admin"){

const btn=document.createElement("button");
btn.innerText="Excluir";
btn.className="deleteBtn";

btn.onclick=function(){
news=news.filter(x=>x.id!==n.id);
renderNews();
};

div.appendChild(btn);

}

list.appendChild(div);

});

}

function addScript(){

const txt=document.getElementById("scriptText").value;

if(!txt) return;

scripts.push({
id:Date.now(),
text:txt
});

document.getElementById("scriptText").value="";

renderScripts();

}

function renderScripts(){

const list=document.getElementById("scriptList");
list.innerHTML="";

scripts.forEach(s=>{

const div=document.createElement("div");
div.className="card";

const scriptBox=document.createElement("div");
scriptBox.className="scriptBox";
scriptBox.id="script-"+s.id;
scriptBox.innerText=s.text;

const copyBtn=document.createElement("button");
copyBtn.innerText="Copiar";
copyBtn.className="copyBtn";

copyBtn.onclick=function(){
copiarScript(s.id,copyBtn);
};

div.appendChild(scriptBox);
div.appendChild(copyBtn);

if(currentUser.role==="admin"){

const del=document.createElement("button");
del.innerText="Excluir";
del.className="deleteBtn";

del.onclick=function(){
scripts=scripts.filter(x=>x.id!==s.id);
renderScripts();
};

div.appendChild(del);

}

list.appendChild(div);

});

}

async function copiarScript(id,btn){

try{

const box=document.getElementById("script-"+id);

if(!box) return;

const texto=box.innerText;

await navigator.clipboard.writeText(texto);

const original=btn.innerText;

btn.innerText="Copiado!";
btn.disabled=true;

setTimeout(function(){
btn.innerText=original;
btn.disabled=false;
},2000);

}catch(e){

alert("Erro ao copiar");

}

}

</script>

</body>
</html>
