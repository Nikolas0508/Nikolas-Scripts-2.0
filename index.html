<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikolas Scripts</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --cyan:#00f0ff;
    --cyanSoft:#00d9ff;
    --bg1:#020617;
    --bg2:#031b2e;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    height:100vh;
    color:white;
    background:linear-gradient(140deg,#020617,#032b4a,#020617);
    background-size:400% 400%;
    animation:bgmove 40s ease infinite;
    overflow:hidden;
}
@keyframes bgmove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* LOGIN */
.login{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}
.loginBox{
    width:360px;
    padding:45px;
    border-radius:20px;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(25px);
    border:1px solid rgba(0,240,255,0.4);
    box-shadow:0 0 20px rgba(0,240,255,0.3),0 0 80px rgba(0,240,255,0.15);
}
.loginBox h2{
    font-family:'Orbitron',sans-serif;
    text-align:center;
    margin-bottom:30px;
    color:var(--cyan);
}
input,textarea,select{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    background:#020617;
    border:1px solid rgba(0,240,255,0.3);
    border-radius:8px;
    color:white;
}
button{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    background:linear-gradient(90deg,#00f0ff,#00c8ff);
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(0,240,255,0.7);
}

/* APP */
.app{display:none;}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    height:100vh;
    width:260px;
    background:rgba(10,20,35,0.9);
    border-right:1px solid rgba(0,240,255,0.25);
    backdrop-filter:blur(20px);
    padding:30px;
}
.sidebar::before{
    content:"";
    position:absolute;
    right:0;
    top:0;
    width:3px;
    height:100%;
    background:linear-gradient(#00f0ff,#00aaff);
    box-shadow:0 0 15px #00f0ff;
}
.logo{
    font-family:'Orbitron',sans-serif;
    font-size:22px;
    color:var(--cyan);
    margin-bottom:40px;
}
.sidebar a{
    display:block;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    color:#cbd5e1;
}
.sidebar a:hover{
    background:rgba(0,240,255,0.15);
    color:var(--cyan);
    transform:translateX(6px);
}
/* LOGOUT */
.logout{
    position:absolute;
    bottom:30px;
    width:200px;
}

/* TOPBAR */
.topbar{
    position:fixed;
    left:260px;
    top:0;
    height:70px;
    width:calc(100% - 260px);
    background:rgba(10,20,35,0.8);
    border-bottom:1px solid rgba(0,240,255,0.25);
    display:flex;
    align-items:center;
    padding-left:30px;
    font-weight:600;
    color:var(--cyan);
}

/* CONTENT */
.content{
    margin-left:260px;
    margin-top:70px;
    padding:35px;
    height:calc(100vh - 70px);
    overflow:auto;
}

/* TITULO */
.title{
    font-size:34px;
    font-weight:700;
    margin-bottom:25px;
    color:var(--cyan);
    font-family:'Orbitron',sans-serif;
}

/* CARDS */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,240,255,0.25);
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 25px rgba(0,240,255,0.3);
}
.hidden{display:none;}

/* BOTÕES FLUTUANTES PEQUENOS */
.floatBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:40px;
    height:40px;
    font-size:16px;
    background:var(--cyan);
    border:none;
    border-radius:50%;
    color:#020617;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,240,255,0.6);
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}
.floatBtn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px rgba(0,240,255,0.9);
}

/* ESTRELAS */
.stars span{
    font-size:24px;
    cursor:pointer;
    color:rgba(0,240,255,0.3);
    transition:0.2s;
}
.stars span.active{
    color:var(--cyan);
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="loginBox">
    <h2>Nikolas Scripts</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">Nikolas Scripts</div>
    <a onclick="show('inicio')">Inicio</a>
    <a onclick="show('tutoriais')">Tutoriais</a>
    <a onclick="show('scripts')">Scripts</a>
    <a onclick="show('tarefas')">Tarefas</a>
    <a onclick="show('avaliacao')">Avaliação</a>
    <a onclick="show('admin')">Admin</a>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <div class="topbar" id="topText">Bem-vindo</div>

  <div class="content">
    <!-- INICIO -->
    <div id="inicio">
      <div class="title">Inicio</div>
      <div id="news"></div>
      <!-- BOTÃO FLUTUANTE PARA ADMIN -->
      <button class="floatBtn hidden" id="addNewsBtn" onclick="showModal('news')">N</button>
    </div>

    <!-- TUTORIAIS -->
    <div id="tutoriais" class="hidden">
      <div class="title">Tutoriais</div>
      <div class="card">Conteúdo em breve.</div>
      <div class="card">Novo tutorial: Aprenda a usar scripts básicos.</div>
    </div>

    <!-- SCRIPTS -->
    <div id="scripts" class="hidden">
      <div class="title">Scripts</div>
      <div id="scriptsList"></div>
      <button class="floatBtn hidden" id="addScriptBtn" onclick="showModal('script')">S</button>
    </div>

    <!-- TAREFAS -->
    <div id="tarefas" class="hidden">
      <div class="title">Tarefas</div>
      <div id="taskInput" class="card">
        <p>Envie seus dados para receber ajuda.</p>
        <input id="tUser" placeholder="@escola ou RA">
        <input id="tPass" placeholder="Senha">
        <input id="tContato" placeholder="Contato">
        <button onclick="enviarTarefa()">Enviar</button>
      </div>
      <div id="tasksList"></div>
    </div>

    <!-- AVALIAÇÃO -->
    <div id="avaliacao" class="hidden">
      <div class="title">Avaliação</div>
      <div class="card">
        <div class="stars" id="rating">
          <span onclick="setRating(1)">★</span>
          <span onclick="setRating(2)">★</span>
          <span onclick="setRating(3)">★</span>
          <span onclick="setRating(4)">★</span>
          <span onclick="setRating(5)">★</span>
        </div>
        <textarea id="coment" placeholder="Sugestão ou crítica"></textarea>
        <button onclick="publicarAvaliacao()">Publicar</button>
      </div>
      <div id="avaliacoes"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="hidden">
      <div class="title">Admin</div>

      <div class="card">
        <h3>Criar Usuário</h3>
        <input id="newUser" placeholder="Usuário">
        <input id="newPass" placeholder="Senha">
        <select id="newRole">
          <option value="admin">ADM</option>
          <option value="amigo">Amigo</option>
          <option value="desconhecido">Desconhecido</option>
        </select>
        <button onclick="addUser()">Criar</button>
      </div>

      <div class="card" id="adminTasksList">
        <h3>Tarefas Enviadas</h3>
      </div>

    </div>

  </div>
</div>

<!-- MODAL -->
<div id="modalPanel" class="hidden">
  <div class="card" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;background:rgba(0,0,0,0.85);z-index:200;">
    <h3 id="modalTitle"></h3>
    <input id="modalInput1" placeholder="">
    <textarea id="modalInput2" placeholder=""></textarea>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
      <button onclick="saveModal()">Salvar</button>
      <button onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
let users={"NikolasP":{pass:"2011",role:"admin"}}
let currentUser=null
let ratingValue=0

// LOGIN
function login(){
  let user=document.getElementById("user").value
  let pass=document.getElementById("pass").value
  if(users[user] && users[user].pass===pass){
    currentUser=users[user]
    loginPage.style.display="none"
    app.style.display="block"
    topText.innerText="Bem-vindo, "+user

    // Mostrar botões de admin
    if(currentUser.role==="admin"){
      addNewsBtn.classList.remove("hidden")
      addScriptBtn.classList.remove("hidden")
    }else{
      document.querySelector('[onclick="show(\'admin\')"]').style.display="none"
    }
  }else{
    alert("Login inválido")
  }
}

// LOGOUT
function logout(){location.reload()}

// MUDANÇA DE ABA
function show(id){
  ["inicio","tutoriais","scripts","tarefas","avaliacao","admin"].forEach(p=>{
    document.getElementById(p).classList.add("hidden")
  })
  document.getElementById(id).classList.remove("hidden")
}

// ESTRELAS
function setRating(val){
  ratingValue=val
  document.querySelectorAll("#rating span").forEach((s,i)=>{s.classList.toggle("active", i<val)})
}

// PUBLICAR AVALIAÇÃO
function publicarAvaliacao(){
  let txt=coment.value
  let card=document.createElement("div")
  card.className="card"
  card.innerHTML=`${txt} <button onclick="deleteCard(this)">Excluir</button>`
  avaliacoes.prepend(card)
  if(currentUser.role!=="admin"){card.querySelector("button").style.display="none"}
  coment.value=""
}

// ENVIAR TAREFA
function enviarTarefa(){
  let u=tUser.value, p=tPass.value, c=tContato.value
  if(!u||!p||!c){alert("Preencha todos os campos");return}
  alert("Login enviado! O administrador entrará em contato.")
  let card=document.createElement("div")
  card.className="card"
  card.innerHTML=`Usuário: ${u} | Contato: ${c} <button onclick="deleteCard(this)">Excluir</button>`
  tasksList.prepend(card)
  if(currentUser.role!=="admin"){card.querySelector("button").style.display="none"}
  tUser.value=""; tPass.value=""; tContato.value=""
}

// ADMIN
function addUser(){
  let u=newUser.value,p=newPass.value,r=newRole.value
  if(!u||!p){alert("Preencha os campos");return}
  users[u]={pass:p,role:r}
  alert("Usuário criado!")
  newUser.value=""; newPass.value=""
}

// NOVIDADE
function showModal(type){
  modalPanel.classList.remove("hidden")
  if(type==="news"){
    modalTitle.innerText="Adicionar Novidade"
    modalInput1.placeholder="Título"
    modalInput2.placeholder="Texto da novidade"
    modalPanel.dataset.type="news"
  }else if(type==="script"){
    modalTitle.innerText="Adicionar Script"
    modalInput1.placeholder="Título"
    modalInput2.placeholder="Script"
    modalPanel.dataset.type="script"
  }
  modalInput1.value=""; modalInput2.value=""
}
function closeModal(){modalPanel.classList.add("hidden")}
function saveModal(){
  let t=modalInput1.value,s=modalInput2.value
  if(!t||!s){alert("Preencha todos os campos");return}
  if(modalPanel.dataset.type==="news"){
    let card=document.createElement("div")
    card.className="card"
    card.innerHTML=`<b>${t}</b><p>${s}</p><button onclick="deleteCard(this)">Excluir</button>`
    news.prepend(card)
    if(currentUser.role!=="admin"){card.querySelector("button").style.display="none"}
  }else if(modalPanel.dataset.type==="script"){
    let card=document.createElement("div")
    card.className="card"
    card.innerHTML=`<b>${t}</b><br><button onclick="copyScript(\`${s}\`)">Copiar</button><button onclick="deleteCard(this)">Excluir</button>`
    scriptsList.prepend(card)
    if(currentUser.role!=="admin"){card.querySelector("button:nth-child(2)").style.display="none"}
  }
  closeModal()
}

// DELETE CARD
function deleteCard(btn){btn.parentElement.remove()}

// COPY SCRIPT
function copyScript(txt){navigator.clipboard.writeText(txt);alert("Script copiado!")}
</script>
</body>
</html>
