<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikolas Scripts</title>

<link rel="icon" type="image/png" href="favicon.png?v=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--neon:#00eaff;
--dark:#020617;
--panel:#0a0f1c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

/* FUNDO RGB */

body{

background:linear-gradient(
140deg,
#000000,
#020617,
#0a1b2f,
#020617,
#000000
);

background-size:600% 600%;

animation:windRGB 40s ease infinite;

}

@keyframes windRGB{

0%{background-position:0% 50%;}
25%{background-position:100% 40%;}
50%{background-position:40% 100%;}
75%{background-position:60% 0%;}
100%{background-position:0% 50%;}

}

/* LOGIN */

.login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:360px;
padding:40px;

background:rgba(10,10,20,0.75);

border-radius:14px;

backdrop-filter:blur(14px);

border:1px solid rgba(0,200,255,0.25);

box-shadow:
0 0 20px rgba(0,200,255,0.35),
0 0 40px rgba(0,200,255,0.15);

animation:fade 0.8s ease;

}

@keyframes fade{

from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}

}

.login-box h2{

text-align:center;
color:#00eaff;
margin-bottom:5px;
font-weight:800;

}

.sub{

text-align:center;
font-size:13px;
color:#aaa;
margin-bottom:25px;

}

input{

width:100%;
padding:12px;
margin:10px 0;

background:rgba(0,0,0,0.6);

border-radius:8px;

border:1px solid rgba(0,200,255,0.25);

color:white;

outline:none;

transition:0.3s;

}

input:focus{

border:1px solid #00eaff;

box-shadow:0 0 8px #00eaff;

}

button{

width:100%;
padding:12px;

margin-top:10px;

background:linear-gradient(45deg,#00eaff,#008cff);

border:none;

border-radius:8px;

color:white;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 10px #00eaff,
0 0 20px #008cff;

}

#loader{

border:3px solid rgba(0,200,255,0.2);
border-top:3px solid #00eaff;

border-radius:50%;

width:25px;
height:25px;

margin:15px auto;

animation:spin 0.7s linear infinite;

}

@keyframes spin{

0%{transform:rotate(0)}
100%{transform:rotate(360deg)}

}

.hidden{display:none}

/* APP */

.app{

opacity:0;
transform:scale(.97);
transition:0.6s;

}

.app.show{

opacity:1;
transform:scale(1);

}

/* SIDEBAR SUPER PROFISSIONAL */

.sidebar{

position:fixed;

width:260px;
height:100vh;

background:rgba(5,10,20,0.9);

backdrop-filter:blur(10px);

padding:30px 20px;

border-right:1px solid rgba(0,200,255,0.15);

box-shadow:5px 0 30px rgba(0,0,0,0.6);

}

.logo{

font-size:22px;
font-weight:800;

color:#00eaff;

margin-bottom:40px;

letter-spacing:1px;

text-shadow:0 0 10px rgba(0,200,255,0.6);

}

/* MENU */

.menu{

display:flex;
flex-direction:column;
gap:5px;

}

.menu a{

display:flex;

align-items:center;

gap:10px;

padding:12px 14px;

border-radius:8px;

cursor:pointer;

color:#cfd6e4;

transition:0.25s;

position:relative;

font-weight:500;

}

.menu a:hover{

background:rgba(0,200,255,0.08);

color:#00eaff;

transform:translateX(5px);

}

/* ITEM ATIVO */

.menu a.active{

background:rgba(0,200,255,0.15);

color:#00eaff;

}

.menu a.active::before{

content:"";

position:absolute;

left:0;
top:8px;

width:4px;
height:24px;

background:#00eaff;

border-radius:2px;

box-shadow:0 0 10px #00eaff;

}

/* LOGOUT */

.logout{

position:absolute;

bottom:25px;

left:20px;

width:80%;

}

/* TOPBAR */

.topbar{

position:fixed;

left:260px;

width:calc(100% - 260px);

height:65px;

background:rgba(5,10,20,0.85);

backdrop-filter:blur(10px);

border-bottom:1px solid rgba(0,200,255,0.15);

display:flex;
align-items:center;

padding-left:25px;

font-weight:600;

color:#00eaff;

}

/* CONTENT */

.content{

margin-left:260px;

margin-top:90px;

padding:30px;

}

.card{

background:rgba(10,20,30,0.65);

padding:20px;

border-radius:10px;

margin-bottom:20px;

border:1px solid rgba(0,200,255,0.1);

transition:0.3s;

}

.card:hover{

transform:translateY(-3px);

box-shadow:0 0 10px rgba(0,200,255,0.3);

}

.title{

font-size:26px;
font-weight:700;
margin-bottom:10px;

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginPage">

<div class="login-box">

<h2>Nikolas Scripts</h2>
<p class="sub">Painel administrativo</p>

<input id="username" placeholder="Usuário">
<input id="password" type="password" placeholder="Senha">

<div id="loader" class="hidden"></div>

<button onclick="login()">Entrar</button>

<p id="msg" style="color:#ff4d4d;margin-top:10px;"></p>

</div>
</div>

<!-- APP -->

<div class="app hidden" id="app">

<div class="sidebar">

<div class="logo">Nikolas Scripts</div>

<div class="menu">

<a onclick="show('inicio')" class="active">🏠 Início</a>
<a onclick="show('scripts')">📜 Scripts</a>
<a onclick="show('tutorial')">📘 Tutorial</a>

</div>

<button class="logout" onclick="logout()">Sair</button>

</div>

<div class="topbar">

<span id="userDisplayTop"></span>

</div>

<div class="content">

<div id="inicio">

<div class="card">

<div class="title">Painel Principal</div>

<p>Seu painel profissional está funcionando.</p>

</div>

</div>

<div id="scripts" class="hidden">

<div class="title">Scripts</div>

<div class="card">Script exemplo</div>

</div>

<div id="tutorial" class="hidden">

<div class="title">Tutorial</div>

<div class="card">Como usar scripts</div>

</div>

</div>

</div>

<script>

const username=document.getElementById("username")
const password=document.getElementById("password")

const loader=document.getElementById("loader")
const msg=document.getElementById("msg")

const loginPage=document.getElementById("loginPage")
const app=document.getElementById("app")

const userDisplayTop=document.getElementById("userDisplayTop")

async function login(){

loader.classList.remove("hidden")

msg.innerText=""

await new Promise(r=>setTimeout(r,700))

if(username.value==="NikolasP" && password.value==="2011"){

loader.classList.add("hidden")

loginPage.classList.add("hidden")

app.classList.remove("hidden")

setTimeout(()=>{

app.classList.add("show")

},50)

userDisplayTop.innerText=`Bem-vindo, ${username.value}`

}else{

loader.classList.add("hidden")

msg.innerText="Usuário ou senha inválidos"

}

}

function logout(){

location.reload()

}

function show(id){

["inicio","scripts","tutorial"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".menu a").forEach(x=>x.classList.remove("active"))

event.target.classList.add("active")

}

</script>

</body>
</html>
