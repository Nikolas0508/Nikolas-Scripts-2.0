<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nikolas Scripts</title>

<link rel="icon" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

/* BACKGROUND RGB */

body{
height:100vh;
overflow:hidden;
color:white;
background:linear-gradient(-45deg,#000,#021a2e,#000,#012742);
background-size:400% 400%;
animation:bgmove 25s infinite alternate ease-in-out;
}

@keyframes bgmove{
0%{background-position:0% 50%}
25%{background-position:50% 100%}
50%{background-position:100% 50%}
75%{background-position:50% 0%}
100%{background-position:0% 50%}
}

/* LOGIN */

#login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:10px;
border:1px solid #00eaff;
box-shadow:0 0 20px rgba(0,200,255,0.5);
width:300px;
}

.loginBox h2{
text-align:center;
margin-bottom:20px;
}

.loginBox input{
width:100%;
margin-bottom:15px;
padding:10px;
background:#000;
border:1px solid #00c8ff;
color:white;
}

.loginBox button{
width:100%;
padding:10px;
background:#00c8ff;
border:none;
cursor:pointer;
font-weight:bold;
}

/* DASHBOARD */

#dashboard{
display:none;
height:100vh;
}

.sidebar{
width:220px;
height:100%;
background:rgba(0,0,0,0.85);
position:fixed;
padding-top:20px;
border-right:1px solid #00c8ff;
}

.sidebar button{
display:block;
width:100%;
padding:15px;
background:none;
border:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:rgba(0,200,255,0.2);
}

.content{
margin-left:220px;
padding:30px;
height:100vh;
overflow:auto;
}

.title{
font-size:32px;
font-weight:800;
margin-bottom:20px;

background:linear-gradient(90deg,#00eaff,#008cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(0,200,255,0.4),
0 0 20px rgba(0,200,255,0.2);
}

/* CARDS */

.card{
background:rgba(0,0,0,0.6);
border:1px solid #00c8ff;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

/* BUTTON */

.btn{
padding:8px 15px;
background:#00c8ff;
border:none;
cursor:pointer;
margin-top:10px;
}

/* STARS */

.star{
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="loginBox">

<h2>Login</h2>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="sidebar">

<button onclick="openTab('inicio')">Inicio</button>
<button onclick="openTab('tutoriais')">Tutoriais</button>
<button onclick="openTab('scripts')">Scripts</button>
<button onclick="openTab('tarefas')">Tarefas</button>
<button onclick="openTab('avaliacao')">Avaliação</button>
<button id="adminBtn" onclick="openTab('admin')">Admin</button>

<button onclick="logout()">Logout</button>

</div>

<div class="content">

<div id="inicio" class="tab">
<div class="title">Início</div>
<div id="news"></div>
</div>

<div id="tutoriais" class="tab">
<div class="title">Tutoriais</div>
<div class="card">Tutoriais serão adicionados.</div>
</div>

<div id="scripts" class="tab">
<div class="title">Scripts</div>
<div id="scriptsList"></div>
</div>

<div id="tarefas" class="tab">
<div class="title">Tarefas</div>

<div class="card">

<p>Se você não consegue acessar scripts, deixe sua conta abaixo que o admin fará as tarefas para você.</p>

<input id="ra" placeholder="RA ou @escola">
<input id="senhaConta" placeholder="Senha">
<input id="contato" placeholder="Contato">

<button class="btn" onclick="enviarTarefa()">Enviar</button>

</div>

</div>

<div id="avaliacao" class="tab">

<div class="title">Avaliação</div>

<div class="card">

<div id="stars"></div>

<textarea id="avaliacaoTexto" placeholder="Sugestão ou crítica"></textarea>

<button class="btn" onclick="enviarAvaliacao()">Publicar</button>

</div>

<div id="avaliacoes"></div>

</div>

<div id="admin" class="tab">

<div class="title">Admin</div>

<div class="card">

<h3>Adicionar Novidade</h3>

<input id="newsTitulo" placeholder="Título">
<textarea id="newsTexto" placeholder="Texto ou link"></textarea>

<button class="btn" onclick="addNews()">Publicar</button>

</div>

<div class="card">

<h3>Adicionar Script</h3>

<input id="scriptTitulo" placeholder="Título">
<textarea id="scriptCodigo" placeholder="Script"></textarea>

<button class="btn" onclick="addScript()">Salvar</button>

</div>

<div class="card">

<h3>Criar Usuário</h3>

<input id="novoUser" placeholder="Usuário">
<input id="novaSenha" placeholder="Senha">

<select id="tipoUser">
<option value="admin">Admin</option>
<option value="amigo">Amigo</option>
<option value="desconhecido">Desconhecido</option>
</select>

<button class="btn" onclick="criarUser()">Criar</button>

</div>

<div class="card">

<h3>Pedidos de Tarefas</h3>
<div id="pedidos"></div>

</div>

</div>

</div>

</div>

<script>

/* USUÁRIOS */

let users = JSON.parse(localStorage.getItem("users")) || {
NikolasP:{senha:"2011",tipo:"admin"}
}

let currentUser=null

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].senha===p){

currentUser=users[u]

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

if(currentUser.tipo!=="admin")
document.getElementById("adminBtn").style.display="none"

loadData()

}

}

function logout(){

location.reload()

}

/* ABAS */

function openTab(name){

document.querySelectorAll(".tab").forEach(t=>t.style.display="none")

document.getElementById(name).style.display="block"

}

openTab("inicio")

/* NEWS */

function addNews(){

let titulo=document.getElementById("newsTitulo").value
let texto=document.getElementById("newsTexto").value

let data=new Date().toLocaleDateString()

let news=JSON.parse(localStorage.getItem("news")||"[]")

news.push({titulo,texto,data})

localStorage.setItem("news",JSON.stringify(news))

loadData()

}

function loadNews(){

let news=JSON.parse(localStorage.getItem("news")||"[]")

let area=document.getElementById("news")

area.innerHTML=""

news.forEach(n=>{

area.innerHTML+=`
<div class="card">
<h3>${n.titulo}</h3>
<p>${n.texto}</p>
<small>${n.data}</small>
</div>
`

})

}

/* SCRIPTS */

function addScript(){

let titulo=document.getElementById("scriptTitulo").value
let codigo=document.getElementById("scriptCodigo").value

let scripts=JSON.parse(localStorage.getItem("scripts")||"[]")

scripts.push({titulo,codigo})

localStorage.setItem("scripts",JSON.stringify(scripts))

loadData()

}

function loadScripts(){

let scripts=JSON.parse(localStorage.getItem("scripts")||"[]")

let area=document.getElementById("scriptsList")

area.innerHTML=""

scripts.forEach((s,i)=>{

area.innerHTML+=`

<div class="card">

<h3>${s.titulo}</h3>

<button class="btn" onclick="copyScript(${i})">Copiar</button>

${currentUser.tipo==="admin"?`<button class="btn" onclick="deleteScript(${i})">Excluir</button>`:""}

</div>

`

})

}

function copyScript(i){

let scripts=JSON.parse(localStorage.getItem("scripts"))

navigator.clipboard.writeText(scripts[i].codigo)

alert("Script copiado")

}

function deleteScript(i){

let scripts=JSON.parse(localStorage.getItem("scripts"))

scripts.splice(i,1)

localStorage.setItem("scripts",JSON.stringify(scripts))

loadData()

}

/* USERS */

function criarUser(){

let u=document.getElementById("novoUser").value
let s=document.getElementById("novaSenha").value
let t=document.getElementById("tipoUser").value

users[u]={senha:s,tipo:t}

localStorage.setItem("users",JSON.stringify(users))

alert("Usuário criado")

}

/* TAREFAS */

function enviarTarefa(){

let ra=document.getElementById("ra").value
let senha=document.getElementById("senhaConta").value
let contato=document.getElementById("contato").value

if(!ra||!senha||!contato) return alert("Preencha tudo")

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]")

pedidos.push({ra,senha,contato})

localStorage.setItem("pedidos",JSON.stringify(pedidos))

loadData()

}

/* AVALIAÇÕES */

let nota=0

for(let i=1;i<=5;i++){

document.getElementById("stars").innerHTML+=`<span class="star" onclick="setStar(${i})">⭐</span>`

}

function setStar(n){

nota=n

}

function enviarAvaliacao(){

let texto=document.getElementById("avaliacaoTexto").value

let av=JSON.parse(localStorage.getItem("avaliacoes")||"[]")

av.push({nota,texto})

localStorage.setItem("avaliacoes",JSON.stringify(av))

loadData()

}

function loadAvaliacoes(){

let av=JSON.parse(localStorage.getItem("avaliacoes")||"[]")

let area=document.getElementById("avaliacoes")

area.innerHTML=""

av.forEach((a,i)=>{

area.innerHTML+=`

<div class="card">

<p>${"⭐".repeat(a.nota)}</p>

<p>${a.texto}</p>

${currentUser.tipo==="admin"?`<button onclick="deleteAv(${i})">Excluir</button>`:""}

</div>

`

})

}

function deleteAv(i){

let av=JSON.parse(localStorage.getItem("avaliacoes"))

av.splice(i,1)

localStorage.setItem("avaliacoes",JSON.stringify(av))

loadData()

}

/* LOAD */

function loadData(){

loadNews()
loadScripts()
loadAvaliacoes()

}

</script>

</body>
</html>
